services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eris-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eris}
      POSTGRES_USER: ${POSTGRES_USER:-eris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-eris_secret_2026}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eris} -d ${POSTGRES_DB:-eris}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eris-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_2026} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: eris-api
    restart: always
    # 宿主机仓库 ./docs（如 /opt/eris/docs）只读挂进容器，供 /ops/*.html 静态页使用（勿占用 /docs，Swagger 已用）
    volumes:
      - ./docs:/srv/ops-docs:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eris}:${POSTGRES_PASSWORD:-eris_secret_2026}@postgres:5432/${POSTGRES_DB:-eris}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_2026}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_key_in_production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      # pydantic-settings reads these from the container env (compose does not mount .env into api)
      LLM_ECHO_FALLBACK: ${LLM_ECHO_FALLBACK:-0}
      SILENT_REACTIVATION_ENABLED: ${SILENT_REACTIVATION_ENABLED:-0}
      SILENT_REACTIVATION_CRON: ${SILENT_REACTIVATION_CRON:-0 2 * * *}
      NOTIFICATION_SENDER_ENABLED: ${NOTIFICATION_SENDER_ENABLED:-0}
      NOTIFICATION_SENDER_POLL_SECONDS: ${NOTIFICATION_SENDER_POLL_SECONDS:-20}
      CONTENT_SAFETY_ENABLED: ${CONTENT_SAFETY_ENABLED:-0}
      CONTENT_SAFETY_MODERATION_ENABLED: ${CONTENT_SAFETY_MODERATION_ENABLED:-1}
      CONTENT_SAFETY_MODERATION_TIMEOUT_S: ${CONTENT_SAFETY_MODERATION_TIMEOUT_S:-12}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://hugme2.com/payment/success?session_id={CHECKOUT_SESSION_ID}}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://hugme2.com/payment/cancel}
      ENV: ${ENV:-production}
      OPS_DOCS_DIR: /srv/ops-docs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:

