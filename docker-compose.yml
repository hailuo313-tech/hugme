services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: eris-postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-eris}
      POSTGRES_USER: ${POSTGRES_USER:-eris}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-6eb5e4b6495952ec53cc9b2949ed4282}
      POSTGRES_MIGRATION_USER: ${POSTGRES_MIGRATION_USER:-eris_migration}
      POSTGRES_WRITER_USER: ${POSTGRES_WRITER_USER:-eris_writer}
      POSTGRES_READER_USER: ${POSTGRES_READER_USER:-eris_reader}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eris} -d ${POSTGRES_DB:-eris}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eris-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret_2026} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redis_secret_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: eris-api
    restart: always
    # 宿主机仓库 ./docs（如 /opt/eris/docs）只读挂进容器，供 /ops/*.html 静态页使用（勿占用 /docs，Swagger 已用）
    volumes:
      - ./docs:/srv/ops-docs:ro
      - ./config:/config:ro
      - ./uploads:/srv/eris-uploads
      - ./data/videos:/data/videos
    environment:
      ERIS_CONFIG_DIR: /config
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-eris}:${POSTGRES_PASSWORD:-6eb5e4b6495952ec53cc9b2949ed4282}@postgres:5432/${POSTGRES_DB:-eris}
      DATABASE_MIGRATION_URL: postgresql+asyncpg://${POSTGRES_MIGRATION_USER:-eris_migration}:${POSTGRES_MIGRATION_PASSWORD:-eris_migration_secret_2026}@postgres:5432/${POSTGRES_DB:-eris}
      DATABASE_READER_URL: postgresql+asyncpg://${POSTGRES_READER_USER:-eris_reader}:${POSTGRES_READER_PASSWORD:-eris_reader_secret_2026}@postgres:5432/${POSTGRES_DB:-eris}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret_2026}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-change_this_secret_key_in_production}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE_URL: ${EMBEDDING_API_BASE_URL:-https://api.openai.com/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_WORKER_ENABLED: ${EMBEDDING_WORKER_ENABLED:-1}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      EMBEDDING_POLL_SECONDS: ${EMBEDDING_POLL_SECONDS:-30}
      EMBEDDING_HTTP_TIMEOUT_SECONDS: ${EMBEDDING_HTTP_TIMEOUT_SECONDS:-20}
      EMBEDDING_SCHEDULER_MAX_INSTANCES: ${EMBEDDING_SCHEDULER_MAX_INSTANCES:-1}
      MEMORY_WRITE_ENABLED: ${MEMORY_WRITE_ENABLED:-1}
      MEMORY_RETRIEVE_IN_PROMPT: ${MEMORY_RETRIEVE_IN_PROMPT:-0}
      MEMORY_IMPORTANCE_THRESHOLD: ${MEMORY_IMPORTANCE_THRESHOLD:-5}
      MEMORY_RETRIEVE_TOP_K: ${MEMORY_RETRIEVE_TOP_K:-10}
      MEMORY_RETRIEVE_K_CANDIDATES: ${MEMORY_RETRIEVE_K_CANDIDATES:-30}
      MEMORY_CONSISTENCY_ENABLED: ${MEMORY_CONSISTENCY_ENABLED:-1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_FERNET_KEY: ${TELEGRAM_SESSION_FERNET_KEY:-}
      TELEGRAM_SESSION_STRINGS: ${TELEGRAM_SESSION_STRINGS:-}
      TELEGRAM_SESSION_DIR: ${TELEGRAM_SESSION_DIR:-./data/telegram_sessions}
      MTProto_ENABLED: ${MTProto_ENABLED:-1}
      SESSION_MANAGER_ENABLED: ${SESSION_MANAGER_ENABLED:-1}
      TELEGRAM_DEVICE_MODEL: ${TELEGRAM_DEVICE_MODEL:-ERIS}
      TELEGRAM_SYSTEM_VERSION: ${TELEGRAM_SYSTEM_VERSION:-1.0}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://hugme2.com}
      MEDIA_UPLOAD_DIR: ${MEDIA_UPLOAD_DIR:-/srv/eris-uploads}
      MEDIA_PUBLIC_PATH: ${MEDIA_PUBLIC_PATH:-/uploads}
      APP_DOWNLOAD_URL: ${APP_DOWNLOAD_URL:-}
      APP_DOWNLOAD_CONVERSION_ENABLED: ${APP_DOWNLOAD_CONVERSION_ENABLED:-1}
      APP_DOWNLOAD_NURTURE_ENABLED: ${APP_DOWNLOAD_NURTURE_ENABLED:-1}
      APP_DOWNLOAD_FIRST_IDLE_SECONDS: ${APP_DOWNLOAD_FIRST_IDLE_SECONDS:-50}
      APP_DOWNLOAD_SECOND_NO_CLICK_SECONDS: ${APP_DOWNLOAD_SECOND_NO_CLICK_SECONDS:-180}
      APP_DOWNLOAD_WARM_NO_CLICK_SECONDS: ${APP_DOWNLOAD_WARM_NO_CLICK_SECONDS:-60}
      APP_DOWNLOAD_CLICK_NO_DOWNLOAD_SECONDS: ${APP_DOWNLOAD_CLICK_NO_DOWNLOAD_SECONDS:-120}
      APP_DOWNLOAD_SILENT_30M_SECONDS: ${APP_DOWNLOAD_SILENT_30M_SECONDS:-1800}
      APP_DOWNLOAD_SILENT_24H_SECONDS: ${APP_DOWNLOAD_SILENT_24H_SECONDS:-86400}
      # pydantic-settings reads these from the container env (compose does not mount .env into api)
      LLM_ECHO_FALLBACK: ${LLM_ECHO_FALLBACK:-0}
      SILENT_REACTIVATION_ENABLED: ${SILENT_REACTIVATION_ENABLED:-1}
      SILENT_REACTIVATION_CRON: ${SILENT_REACTIVATION_CRON:-0 2 * * *}
      NOTIFICATION_SENDER_ENABLED: ${NOTIFICATION_SENDER_ENABLED:-1}
      NOTIFICATION_SENDER_POLL_SECONDS: ${NOTIFICATION_SENDER_POLL_SECONDS:-20}
      NOTIFICATION_SENDER_SCHEDULER_MAX_INSTANCES: ${NOTIFICATION_SENDER_SCHEDULER_MAX_INSTANCES:-1}
      MESSAGE_SCHEDULE_ENABLED: ${MESSAGE_SCHEDULE_ENABLED:-1}
      MESSAGE_SCHEDULE_POLL_SECONDS: ${MESSAGE_SCHEDULE_POLL_SECONDS:-20}
      MESSAGE_SCHEDULE_SCHEDULER_MAX_INSTANCES: ${MESSAGE_SCHEDULE_SCHEDULER_MAX_INSTANCES:-1}
      AUTO_DELIVERY_ENABLED: ${AUTO_DELIVERY_ENABLED:-1}
      AUTO_DELIVERY_POLL_SECONDS: ${AUTO_DELIVERY_POLL_SECONDS:-20}
      AUTO_DELIVERY_SCHEDULER_MAX_INSTANCES: ${AUTO_DELIVERY_SCHEDULER_MAX_INSTANCES:-1}
      ARCHIVE_WORKER_ENABLED: ${ARCHIVE_WORKER_ENABLED:-1}
      ARCHIVE_WORKER_POLL_SECONDS: ${ARCHIVE_WORKER_POLL_SECONDS:-30}
      ARCHIVE_WORKER_SCHEDULER_MAX_INSTANCES: ${ARCHIVE_WORKER_SCHEDULER_MAX_INSTANCES:-1}
      CALL_BROADCAST_ENABLED: ${CALL_BROADCAST_ENABLED:-0}
      CALL_BROADCAST_POLL_SECONDS: ${CALL_BROADCAST_POLL_SECONDS:-15}
      CALL_BROADCAST_SCHEDULER_MAX_INSTANCES: ${CALL_BROADCAST_SCHEDULER_MAX_INSTANCES:-1}
      CALL_BROADCAST_MAX_CONCURRENT_PER_ACCOUNT: ${CALL_BROADCAST_MAX_CONCURRENT_PER_ACCOUNT:-1}
      CALL_BROADCAST_DEFAULT_DURATION_SECONDS: ${CALL_BROADCAST_DEFAULT_DURATION_SECONDS:-30}
      CALL_BROADCAST_DEFAULT_VIDEO_PATH: ${CALL_BROADCAST_DEFAULT_VIDEO_PATH:-}
      CALL_BROADCAST_DEFAULT_VIDEO_ASSET_ID: ${CALL_BROADCAST_DEFAULT_VIDEO_ASSET_ID:-}
      CALL_BROADCAST_INCOMING_AUTO_ANSWER: ${CALL_BROADCAST_INCOMING_AUTO_ANSWER:-0}
      CALL_BROADCAST_INBOUND_MANUAL_AFTER: ${CALL_BROADCAST_INBOUND_MANUAL_AFTER:-1}
      CALL_BROADCAST_INBOUND_REVIEW_TTL_SECONDS: ${CALL_BROADCAST_INBOUND_REVIEW_TTL_SECONDS:-90}
      CALL_BROADCAST_TRANSCODE_ENABLED: ${CALL_BROADCAST_TRANSCODE_ENABLED:-0}
      CALL_BROADCAST_POST_CALL_NURTURE_ENABLED: ${CALL_BROADCAST_POST_CALL_NURTURE_ENABLED:-1}
      CALL_BROADCAST_VIDEO_ROOT: ${CALL_BROADCAST_VIDEO_ROOT:-/data/videos}
      # D4-4: profile score worker scheduler (initiation_score / trigger_threshold).
      SCORE_WORKER_ENABLED: ${SCORE_WORKER_ENABLED:-0}
      SCORE_WORKER_POLL_SECONDS: ${SCORE_WORKER_POLL_SECONDS:-120}
      SCORE_WORKER_SCHEDULER_MAX_INSTANCES: ${SCORE_WORKER_SCHEDULER_MAX_INSTANCES:-1}
      SCORE_INITIATION_LOOKBACK_DAYS: ${SCORE_INITIATION_LOOKBACK_DAYS:-7}
      SCORE_INITIATION_CAP_MESSAGES: ${SCORE_INITIATION_CAP_MESSAGES:-40}
      SCORE_PROFILE_MIN_UPDATE_DELTA: ${SCORE_PROFILE_MIN_UPDATE_DELTA:-0.05}
      TRIGGER_THRESHOLD_BASE: ${TRIGGER_THRESHOLD_BASE:-65}
      TRIGGER_THRESHOLD_PIVOT: ${TRIGGER_THRESHOLD_PIVOT:-35}
      TRIGGER_THRESHOLD_K: ${TRIGGER_THRESHOLD_K:-0.15}
      TRIGGER_THRESHOLD_FLOOR: ${TRIGGER_THRESHOLD_FLOOR:-50}
      TRIGGER_THRESHOLD_CEIL: ${TRIGGER_THRESHOLD_CEIL:-82}
      # POL-01 / D4-4-OPS: handoff task creation from policy thresholds.
      POLICY_SERVICE_ENABLED: ${POLICY_SERVICE_ENABLED:-1}
      POLICY_RISK_SCORE_THRESHOLD: ${POLICY_RISK_SCORE_THRESHOLD:-75}
      POLICY_LONELINESS_THRESHOLD: ${POLICY_LONELINESS_THRESHOLD:-82}
      POLICY_VIP_LEVEL_THRESHOLD: ${POLICY_VIP_LEVEL_THRESHOLD:-1}
      POLICY_HANDOFF_COUNT_THRESHOLD: ${POLICY_HANDOFF_COUNT_THRESHOLD:-3}
      LEVEL_S_MIN_SPEND: ${LEVEL_S_MIN_SPEND:-200}
      LEVEL_A_MIN_SPEND: ${LEVEL_A_MIN_SPEND:-99}
      LEVEL_B_MIN_SPEND: ${LEVEL_B_MIN_SPEND:-0}
      LEVEL_VIP_LEVEL_A_MIN: ${LEVEL_VIP_LEVEL_A_MIN:-1}
      LEVEL_T1_DEFAULT: ${LEVEL_T1_DEFAULT:-B}
      LEVEL_T2_DEFAULT: ${LEVEL_T2_DEFAULT:-C}
      LEVEL_T3_DEFAULT: ${LEVEL_T3_DEFAULT:-C}
      LEVEL_UNKNOWN_DEFAULT: ${LEVEL_UNKNOWN_DEFAULT:-C}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-https://hugme2.com/payment/success?session_id={CHECKOUT_SESSION_ID}}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-https://hugme2.com/payment/cancel}
      ENV: ${ENV:-production}
      OPS_DOCS_DIR: /srv/ops-docs
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: eris-prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - api

  node-exporter:
    image: prom/node-exporter:latest
    container_name: eris-node-exporter
    restart: always
    ports:
      - "127.0.0.1:9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: eris-postgres-exporter
    restart: always
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-eris}:${POSTGRES_PASSWORD:-eris_secret_2026}@postgres:5432/${POSTGRES_DB:-eris}?sslmode=disable
    ports:
      - "127.0.0.1:9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: eris-redis-exporter
    restart: always
    environment:
      REDIS_ADDR: redis://:${REDIS_PASSWORD:-redis_secret_2026}@redis:6379
    ports:
      - "127.0.0.1:9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: eris-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
      GF_SERVER_ROOT_URL: http://localhost:3000
    volumes:
      - ./monitoring/grafana/grafana.ini:/etc/grafana/grafana.ini
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - grafana_data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
