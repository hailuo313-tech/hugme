[server]
# HTTP Port
http_port = 3000

# Domain
domain = localhost

# Root URL
root_url = http://localhost:3000

# Serve from subpath
serve_from_sub_path = false

[security]
# Admin user
admin_user = admin
# Admin password (change in production)
admin_password = admin

[database]
# Database type
type = sqlite3
# Database path
path = /var/lib/grafana/grafana.db

[users]
# Default user role
default_theme = dark

[auth.anonymous]
# Enable anonymous access
enabled = false

[analytics]
# Disable analytics
check_for_updates = false
reporting_enabled = false

[dashboards]
# Default home dashboard
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/home.json

[log]
# Log level
level = info
# Log format
format = text

[log.console]
# Console log level
level = info

[log.file]
# File log level
level = info
# Log file path
file = /var/log/grafana/grafana.log