global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: eris-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - eris-api:8000

  - job_name: eris-postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: eris-redis
    static_configs:
      - targets:
          - redis-exporter:9121

