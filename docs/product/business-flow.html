var CATEGORY_LABEL = {
  safety: ['Safety/Crisis', '#fdba74'],
  profile: ['Profile Intake', '#eab308'],
  onboarding: ['Onboarding', '#a78bfa'],
  intent: ['Intent', '#67e8f9'],
  asset: ['Asset Trigger', '#f472b6'],
  conversion: ['App Conversion', '#22c55e'],
  nurture: ['Nurture', '#60a5fa'],
  llm: ['LLM Reply', '#c4b5fd']
};

var PRIORITY_LABEL = {
  high: ['High', '#fca5a5'],
  medium: ['Medium', '#fdba74'],
  low: ['Low', '#67e8f9']
};

function renderRules(filter) {
  var tbody = document.getElementById('rules-body');
  tbody.innerHTML = '';

  var filtered = RULES;
  if (filter !== 'all') {
    if (['high', 'medium', 'low'].indexOf(filter) !== -1) {
      filtered = RULES.filter(function(r) { return r.priority === filter; });
    } else {
      filtered = RULES.filter(function(r) { return r.category === filter; });
    }
  }

  for (var i = 0; i < filtered.length; i++) {
    var rule = filtered[i];
    var catLabel = CATEGORY_LABEL[rule.category];
    var priLabel = PRIORITY_LABEL[rule.priority];

    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td class="rule-id">' + rule.id + '</td>' +
      '<td><span style="color:' + catLabel[1] + '">' + catLabel[0] + '</span></td>' +
      '<td style="color:#e2eaf6">' + rule.desc + '</td>' +
      '<td><span style="color:' + priLabel[1] + '">' + priLabel[0] + '</span></td>' +
      '<td class="keywords">' + rule.keywords.slice(0, 3).join(', ') + (rule.keywords.length > 3 ? '...' : '') + '</td>' +
      '<td style="font-family:monospace">' + rule.confidence + '</td>' +
      '<td class="desc-detail">' + rule.detail + '</td>';
    tbody.appendChild(tr);
  }

  document.getElementById('rule-count').textContent = filtered.length;
}

function filterRules(filter) {
  console.log('绛涢€夎鍒?', filter);

  var buttons = document.querySelectorAll('.filter-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].classList.remove('active');
  }

  var activeBtn = document.querySelector('[data-filter="' + filter + '"]');
  if (activeBtn) {
    activeBtn.classList.add('active');
  }

  renderRules(filter);
}

function switchPage(pageName) {
  console.log('鍒囨崲鍒伴〉闈?', pageName);

  var buttons = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].classList.remove('active');
  }

  var activeBtn = document.querySelector('[data-page="' + pageName + '"]');
  if (activeBtn) {
    activeBtn.classList.add('active');
  }

  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) {
    pages[i].classList.remove('active');
  }

  var targetPage = document.getElementById('page-' + pageName);
  if (targetPage) {
    targetPage.classList.add('active');

    if (pageName === 'rules') {
      renderRules('all');
    }
  }

  console.log('椤甸潰鍒囨崲瀹屾垚');
}
