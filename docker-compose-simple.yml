version: '3.8'
services:
  api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: eris-api
    restart: always
    volumes:
      - ./app:/app
      - ./config:/app/config
      - ./docs:/srv/ops-docs:ro
    environment:
      DATABASE_URL: postgresql+asyncpg://eris:eris_secret_2026@postgres:5432/eris
      REDIS_URL: redis://:redis_secret_2026@redis:6379/0
      NOVITA_API_KEY: ${NOVITA_API_KEY:-}
      NOVITA_BASE_URL: ${NOVITA_BASE_URL:-https://api.novita.ai/openai}
      NOVITA_CHAT_MODEL: ${NOVITA_CHAT_MODEL:-chat2}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID:-}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH:-}
      TELEGRAM_SESSION_FERNET_KEY: ${TELEGRAM_SESSION_FERNET_KEY:-}
      TELEGRAM_DEVICE_MODEL: ${TELEGRAM_DEVICE_MODEL:-ERIS}
      TELEGRAM_SYSTEM_VERSION: ${TELEGRAM_SYSTEM_VERSION:-1.0}
      MTProto_ENABLED: ${MTProto_ENABLED:-1}
      LLM_ECHO_FALLBACK: ${LLM_ECHO_FALLBACK:-0}
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    container_name: eris-postgres
    restart: always
    environment:
      POSTGRES_DB: eris
      POSTGRES_USER: eris
      POSTGRES_PASSWORD: eris_secret_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: eris-redis
    restart: always
    command: redis-server --requirepass redis_secret_2026
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"

volumes:
  postgres_data:
  redis_data:
