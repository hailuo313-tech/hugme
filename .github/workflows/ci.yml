name: CI

on:
  pull_request:
    branches:
      - main
      - 'release/**'
  push:
    branches:
      - main
      - 'release/**'

jobs:
  backend-ci:
    name: backend-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt -r requirements-dev.txt
      - name: Python 3.9 syntax check
        run: python -m compileall -q app tests
      - name: Pytest
        run: pytest -q

  admin-ci:
    name: admin-ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: admin/package-lock.json
      - name: Build admin
        working-directory: admin
        run: |
          npm ci
          npm run build

  ops-guard:
    name: ops-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure deploy guard exists
        run: |
          test -x deploy.sh
          bash -n deploy.sh
          grep -q 'deploy must run on main' deploy.sh
          grep -q 'dirty working tree' deploy.sh
          grep -q -- '--ff-only origin main' deploy.sh
      - name: Prevent generated frontend artifacts
        run: |
          test ! -d admin/node_modules
          test ! -d admin/.next
